<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>雨の終わりに ― 私立探偵・灰崎の事件簿 ―</title>
<style>
:root{ --ink:#e8e3d3; --gold:#d9b36a; --navy:#0d1321; }
*{box-sizing:border-box; margin:0; padding:0}
body{background:#06080f; color:var(--ink);
 font-family:"Yu Mincho","YuMincho","Hiragino Mincho ProN","MS PMincho",serif;
 display:flex; justify-content:center; align-items:center; min-height:100vh; padding:8px}
#game{width:min(96vw,780px); user-select:none}
#hdr{display:flex; align-items:center; gap:10px; padding:4px 4px 6px; font-size:13px; color:#8b94a8; letter-spacing:.12em}
#hdr .sp{flex:1}
#lives{letter-spacing:4px; color:#d96a6a; display:none; font-size:15px}
button{font-family:inherit; background:#141b2c; color:var(--ink); border:1px solid #3a4663;
 border-radius:4px; padding:7px 14px; font-size:15px; cursor:pointer; letter-spacing:.08em}
button:hover{background:#1d2740; border-color:var(--gold); color:#f6edd8}
.hbtn{padding:3px 10px; font-size:12.5px}
#stage{position:relative; width:100%; aspect-ratio:760/300; background:#000;
 border:1px solid #2a3349; border-radius:6px 6px 0 0; overflow:hidden}
#bg{position:absolute; inset:0}
#bg svg{width:100%; height:100%; display:block}
#bust{position:absolute; left:50%; bottom:-2px; transform:translateX(-50%); height:90%;
 opacity:0; transition:opacity .22s}
#bust.on{opacity:1}
#bust svg{height:100%; display:block; filter:drop-shadow(0 0 18px rgba(0,0,0,.55))}
#clicker{position:absolute; inset:0; z-index:15; display:none; cursor:pointer}
#itemget{position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); z-index:18;
 display:none; pointer-events:none; background:rgba(10,14,24,.95); border:1px solid var(--gold);
 border-radius:8px; padding:14px 22px; text-align:center; max-width:78%;
 box-shadow:0 0 30px rgba(217,179,106,.25)}
#itemget .igIcon{width:46px; height:46px; margin:0 auto 6px}
#itemget .igIcon svg{width:100%; height:100%}
#itemget .igName{color:var(--gold); font-size:16px; letter-spacing:.15em; margin-bottom:4px}
#itemget .igDesc{font-size:12.5px; color:#c9cfdd; line-height:1.7}
#choice{position:absolute; left:50%; bottom:8px; transform:translateX(-50%); display:none;
 flex-direction:column; gap:5px; z-index:20; min-width:48%; max-width:92%}
#choice button{background:rgba(11,16,29,.95); font-size:14.5px; padding:5px 16px; text-align:left}
#flash{position:absolute; inset:0; background:#f3ecd8; display:none; align-items:center;
 justify-content:center; z-index:30}
#flash span{font-size:52px; font-weight:bold; color:#15182a; letter-spacing:.18em;
 text-shadow:3px 3px 0 rgba(180,60,50,.45)}
#title,#endscr{position:absolute; inset:0; z-index:40; display:none; flex-direction:column;
 align-items:center; justify-content:center; gap:10px; text-align:center;
 background:rgba(4,6,12,.35)}
#title h1{font-size:40px; letter-spacing:.3em; text-indent:.3em; color:#f0e8d4;
 text-shadow:0 0 18px rgba(120,160,220,.35); font-weight:600}
#title .sub{font-size:13px; color:#9aa6bd; letter-spacing:.3em}
#title .note{font-size:11.5px; color:#6b7690; letter-spacing:.15em}
#title button{margin-top:8px; padding:9px 36px; font-size:16px}
#endscr h1{font-size:64px; letter-spacing:.2em; color:#e8e0c8}
#endscr .sub{font-size:14px; color:#9aa6bd; letter-spacing:.35em}
.shake{animation:shk .35s}
@keyframes shk{0%,100%{transform:translate(0,0)}20%{transform:translate(-8px,3px)}
 40%{transform:translate(7px,-4px)}60%{transform:translate(-5px,2px)}80%{transform:translate(4px,-2px)}}
#msg{position:relative; background:rgba(10,14,26,.97); border:1px solid #4a5878;
 border-top:1px solid #36415e; border-radius:0 0 6px 6px; min-height:122px;
 padding:16px 20px 14px; font-size:16.5px; line-height:1.9}
#name{position:absolute; top:-13px; left:14px; background:#0d1321; border:1px solid #4a5878;
 padding:1px 14px; font-size:13.5px; letter-spacing:.2em; display:none}
#cursor{position:absolute; right:14px; bottom:6px; color:var(--gold); display:none;
 animation:blnk 1s steps(2) infinite; font-size:14px}
@keyframes blnk{50%{opacity:0}}
#bar{display:flex; gap:8px; padding:10px 2px 2px; flex-wrap:wrap; min-height:52px}
#bar button{font-size:14.5px; padding:7px 16px}
#modal{position:fixed; inset:0; background:rgba(0,0,0,.72); display:none;
 align-items:center; justify-content:center; z-index:50}
#nb{width:min(92vw,620px); max-height:86vh; overflow:auto; background:#11182a;
 border:1px solid #5a6a8c; border-radius:8px; padding:14px 16px}
#nbHead{display:flex; align-items:center; gap:10px; margin-bottom:10px}
#nbHead b{color:var(--gold); letter-spacing:.2em; font-size:15px}
#nbPrompt{font-size:12.5px; color:#d98c6a; flex:1}
.evgrid{display:grid; grid-template-columns:1fr 1fr; gap:7px; margin-bottom:10px}
.evitem{display:flex; gap:9px; align-items:center; border:1px solid #2e3a55; border-radius:6px;
 padding:6px 8px; cursor:pointer; background:#0d1321; font-size:13.5px}
.evitem:hover{border-color:var(--gold)}
.evitem.sel{border-color:var(--gold); background:#1a2238}
.evicon{width:34px; height:34px; flex:none}
.evicon svg{width:100%; height:100%}
#evdetail{display:none; gap:12px; border-top:1px solid #2e3a55; padding-top:10px}
#evdIcon{width:54px; height:54px; flex:none}
#evdIcon svg{width:100%; height:100%}
#evdName{color:var(--gold); font-size:15px; letter-spacing:.12em; margin-bottom:4px}
#evdDesc{font-size:13px; line-height:1.8; color:#ccd3e2; white-space:pre-line}
#evdUse{display:none; margin-top:8px; border-color:#a85a4a; color:#f0c8b0}
@media (max-width:520px){ #title h1{font-size:30px} #msg{font-size:15px} }
</style>
</head>
<body>
<div id="game">
 <div id="hdr">
  <span>雨の終わりに ― 私立探偵・灰崎の事件簿 ―</span>
  <span class="sp"></span>
  <span id="lives"></span>
  <button class="hbtn" id="hdrNb">手帳</button>
  <button class="hbtn" id="hdrSnd">音：オン</button>
 </div>
 <div id="stage">
  <div id="bg"></div>
  <div id="bust"></div>
  <div id="clicker"></div>
  <div id="itemget"><div class="igIcon"></div><div class="igName"></div><div class="igDesc"></div></div>
  <div id="choice"></div>
  <div id="flash"><span></span></div>
  <div id="title">
   <div class="sub">― 私立探偵・灰崎の事件簿 ―</div>
   <h1>雨の終わりに</h1>
   <div class="note">クリック／Enterで読み進める　＊プレイ時間 約10分</div>
   <button id="btnStart">調査をはじめる</button>

  <div id="txt"></div>

 </div>

</div>
<div id="modal"><div id="nb">
 <div id="nbHead"><b>探偵手帳</b><span id="nbPrompt"></span><button class="hbtn" id="nbClose">閉じる</button></div>

  <div id="evdName"></div><div id="evdDesc"></div><button id="evdUse">これをつきつける！</button>
 </div></div>

<script>
'use strict';
/* ========== 基本ユーティリティ ========== */
const el=id=>document.getElementById(id);
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
const stage=el('stage'), bgEl=el('bg'), bustEl=el('bust'), clicker=el('clicker'),
 txtEl=el('txt'), nameEl=el('name'), curEl=el('cursor'), barEl=el('bar'),
 choiceEl=el('choice'), flashEl=el('flash'), modal=el('modal'), ig=el('itemget'),
 livesEl=el('lives');

/* ========== 音 ========== */
let AC=null;
function ac(){ if(!AC){ AC=new (window.AudioContext||window.webkitAudioContext)(); } return AC; }
function tone(f,d,type,v,t0){
 if(!S.sound||!AC) return;
 const a=AC; t0=(t0===undefined)?a.currentTime:t0;
 const o=a.createOscillator(), g=a.createGain();
 o.type=type||'square'; o.frequency.value=f;
 g.gain.setValueAtTime(v||.08,t0); g.gain.exponentialRampToValueAtTime(.0001,t0+d);
 o.connect(g); g.connect(a.destination); o.start(t0); o.stop(t0+d+.03);
}
const blip=()=>tone(980,.03,'square',.016);
const sfxSel=()=>tone(660,.06,'square',.05);
const sfxDing=()=>{tone(880,.12,'sine',.07);tone(1318,.18,'sine',.05,ac().currentTime+.07);};
const sfxBuzz=()=>{tone(110,.28,'sawtooth',.09);tone(104,.3,'sawtooth',.07);};
function sfxSlam(){
 if(!S.sound||!AC) return;
 const a=AC, t=a.currentTime;
 const o=a.createOscillator(), g=a.createGain();
 o.type='sawtooth'; o.frequency.setValueAtTime(220,t);
 o.frequency.exponentialRampToValueAtTime(50,t+.3);
 g.gain.setValueAtTime(.22,t); g.gain.exponentialRampToValueAtTime(.0001,t+.32);
 o.connect(g); g.connect(a.destination); o.start(t); o.stop(t+.35);
 const nb=a.createBuffer(1,a.sampleRate*.2,a.sampleRate), ch=nb.getChannelData(0);
 for(let i=0;i<ch.length;i++) ch[i]=(Math.random()*2-1)*(1-i/ch.length);
 const src=a.createBufferSource(); src.buffer=nb;
 const ng=a.createGain(); ng.gain.value=.18;
 src.connect(ng); ng.connect(a.destination); src.start(t);
}
/* 雨音 */
let rainGain=null;
function setRain(on,fade){
 if(!AC) return;
 const a=AC;
 if(!rainGain){
  const buf=a.createBuffer(1,a.sampleRate*2,a.sampleRate), ch=buf.getChannelData(0);
  for(let i=0;i<ch.length;i++) ch[i]=Math.random()*2-1;
  const src=a.createBufferSource(); src.buffer=buf; src.loop=true;
  const lp=a.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=900;
  rainGain=a.createGain(); rainGain.gain.value=0;
  src.connect(lp); lp.connect(rainGain); rainGain.connect(a.destination); src.start();
 }
 const t=a.currentTime;
 rainGain.gain.cancelScheduledValues(t);
 rainGain.gain.setValueAtTime(rainGain.gain.value,t);
 rainGain.gain.linearRampToValueAtTime(on?.045:0, t+(fade||1.2));
}
/* BGM（簡易シーケンサ） */
const PAT={
 calm:{bpm:84,notes:[
  [0,110,2,'triangle',.06],[4,98,2,'triangle',.06],[8,87.3,2,'triangle',.06],[12,82.4,2,'triangle',.06],
  [2,220,1,'sine',.035],[6,261.6,.8,'sine',.03],[7,246.9,.8,'sine',.03],[10,196,1,'sine',.03],[14,164.8,1.5,'sine',.035]]},
 tense:{bpm:126,notes:[
  [0,110,.8,'square',.045],[2,110,.8,'square',.045],[4,110,.8,'square',.045],[6,116.5,.8,'square',.05],
  [8,110,.8,'square',.045],[10,110,.8,'square',.045],[12,103.8,.8,'square',.05],[14,116.5,.8,'square',.05],
  [3,466.2,.5,'sine',.025],[11,415.3,.5,'sine',.025]]},
 sad:{bpm:66,notes:[
  [0,110,.9,'sine',.05],[1,130.8,.9,'sine',.045],[2,164.8,.9,'sine',.045],[3,220,.9,'sine',.05],
  [4,87.3,.9,'sine',.05],[5,110,.9,'sine',.045],[6,130.8,.9,'sine',.045],[7,174.6,.9,'sine',.05],
  [8,98,.9,'sine',.05],[9,123.5,.9,'sine',.045],[10,146.8,.9,'sine',.045],[11,196,.9,'sine',.05],
  [12,82.4,.9,'sine',.05],[13,103.8,.9,'sine',.045],[14,123.5,.9,'sine',.045],[15,164.8,.9,'sine',.05]]}
};
let bgmName=null, bgmStep=0, bgmNext=0;
function setBGM(name){ bgmName=name; bgmStep=0; if(AC) bgmNext=AC.currentTime+.08; }
setInterval(()=>{
 if(!bgmName||!AC||!S.sound) return;
 const p=PAT[bgmName], spb=60/p.bpm/2;
 if(bgmNext<AC.currentTime) bgmNext=AC.currentTime+.05;
 while(bgmNext<AC.currentTime+.32){
  const si=bgmStep%16;
  for(const n of p.notes) if(n[0]===si) tone(n[1],n[2]*spb*.95,n[3],n[4],bgmNext);
  bgmStep++; bgmNext+=spb;
 }
},110);
/* ========== 背景SVG ========== */
function rainSVG(x,y,w,h,id){
 let lines='';
 for(let r=-1;r<h/46+1;r++){
  const off=(r%2===0)?0:12;
  for(let c=-1;c<w/24+1;c++){
   const lx=x+c*24+off, ly=y+r*46;
   lines+='<line x1="'+lx+'" y1="'+ly+'" x2="'+(lx-7)+'" y2="'+(ly+20)+'" stroke="#aac3e6" stroke-opacity=".32" stroke-width="1.1"/>';
  }
 }
 return '<clipPath id="'+id+'"><rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'"/></clipPath>'+
  '<g clip-path="url(#'+id+')"><g>'+lines+
  '<animateTransform attributeName="transform" type="translate" values="0 0;-12 46" dur="0.55s" repeatCount="indefinite"/></g></g>';
}
function books(x,y,n,h){
 const ws=[12,9,14,8,11,13,7,10,12,9,15,8,11,10,13,9];
 const cs=['#5a3b35','#3e4a5a','#5a523a','#46394f','#503a2c','#3a4a44'];
 let s='',cx=x;
 for(let i=0;i<n;i++){ const w=ws[i%ws.length], bh=h-(i*7%9);
  s+='<rect x="'+cx+'" y="'+(y+(h-bh))+'" width="'+w+'" height="'+bh+'" fill="'+cs[i%cs.length]+'"/>'; cx+=w+2; }
 return s;
}
const BGS={};
BGS.title=()=>{
 return '<svg viewBox="0 0 760 300" xmlns="http://www.w3.org/2000/svg">'

 +'<rect x="170" y="190" width="40" height="54" fill="#060a14"/><rect x="240" y="160" width="60" height="84" fill="#081020"/>'
 +'<rect x="330" y="200" width="46" height="44" fill="#060a14"/><rect x="410" y="150" width="70" height="94" fill="#081020"/>'
 +'<rect x="510" y="185" width="52" height="59" fill="#060a14"/>'
 +'<rect x="254" y="172" width="3" height="3" fill="#e8c478"/><rect x="266" y="186" width="3" height="3" fill="#e8c478"/>'
 +'<rect x="424" y="166" width="3" height="3" fill="#e8c478"/><rect x="438" y="190" width="3" height="3" fill="#8ab0d8"/>'
 +'<rect x="452" y="174" width="3" height="3" fill="#e8c478"/><rect x="524" y="196" width="3" height="3" fill="#8ab0d8"/>'
 +rainSVG(140,28,480,216,'t_rc')
 +'<g>'+[0,1,2,3,4,5].map(i=>'<rect x="136" y="'+(32+i*19)+'" width="488" height="11" fill="#0b1120" opacity=".92"/>').join('')+'</g>'
 +'<circle cx="668" cy="240" r="80" fill="url(#t_lamp)"/>'
 +'<rect x="600" y="246" width="160" height="54" fill="#120d08"/>'
 +'<path d="M640 246 q4 -18 24 -18 q20 0 24 18 Z" fill="#1c1610"/><ellipse cx="664" cy="229" rx="13" ry="5" fill="#241c12"/>'

};
BGS.shosai=()=>{
 return '<svg viewBox="0 0 760 300" xmlns="http://www.w3.org/2000/svg">'
 +'<defs><radialGradient id="s_vg" cx="50%" cy="45%" r="75%"><stop offset="50%" stop-color="#000" stop-opacity="0"/><stop offset="100%" stop-color="#000" stop-opacity=".62"/></radialGradient>'
 +'<radialGradient id="s_lamp" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#f4c873" stop-opacity=".42"/><stop offset="100%" stop-color="#f4c873" stop-opacity="0"/></radialGradient></defs>'

 +books(474,40,15,42)+books(474,102,15,42)+books(474,164,15,40)

 +'<rect x="318" y="198" width="34" height="8" fill="#ece6d2" transform="rotate(-4 335 202)"/>'

 +'<g stroke="#454b52" stroke-width="1.4">'+[0,1,2,3].map(i=>'<line x1="168" y1="'+(184+i*5)+'" x2="196" y2="'+(184+i*5)+'"/>').join('')+'</g>'
 +'<ellipse cx="360" cy="272" rx="170" ry="20" fill="#3a2430" opacity=".55"/>'

};
BGS.ima=()=>{
 return '<svg viewBox="0 0 760 300" xmlns="http://www.w3.org/2000/svg">'
 +'<defs><radialGradient id="i_vg" cx="50%" cy="45%" r="75%"><stop offset="50%" stop-color="#000" stop-opacity="0"/><stop offset="100%" stop-color="#000" stop-opacity=".6"/></radialGradient>'
 +'<radialGradient id="i_lamp" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#f0bd76" stop-opacity=".4"/><stop offset="100%" stop-color="#f0bd76" stop-opacity="0"/></radialGradient></defs>'
 +'<rect width="760" height="300" fill="#1f1b29"/>'
 +'<rect y="214" width="760" height="86" fill="#2a2017"/>'
 +'<line x1="0" y1="214" x2="760" y2="214" stroke="#100c08" stroke-width="2"/>'
 +'<rect x="560" y="38" width="152" height="134" fill="#0d1830" stroke="#3a3326" stroke-width="6"/>'

    ]);
    S.stage='C'; setScene('shosai');
    return;
   }
   await say('kumai','「……そこじゃない気がするな。もう一度だ」');
   continue;
  }
  if(id==='wapro'){ await say('kumai','「惜しいな。それと『組み合わせて』初めて引っかかる物が、手帳にあるだろう」'); continue; }
  if(id==='pen'){ await say('kumai','「万年筆か。……悪くない筋だが、まず大本命があるだろう」'); continue; }
  if(id==null){ await say('kumai','「逃げるなよ、灰崎。お前の手帳の中だ」'); continue; }
  await say('kumai','「……それは別に、食い違っちゃおらんだろう」');

/* ========== 対決パート（尋問） ========== */
function trialAction(){
 return new Promise(r=>{
  const mk=(label,val)=>({label, fn:()=>{ sfxSel(); setBar([]); r(val); }});
  setBar([mk('◀ 前の証言','prev'), mk('次の証言 ▶','next'), mk('ゆさぶる','press'), mk('証拠をつきつける','present')]);
 });
}
async function showStatement(st,i,n){
 nameEl.textContent='水原の証言　'+(i+1)+'／'+n;
 nameEl.style.color='#9adfae'; nameEl.style.display='inline-block';
 setBust('mizuhara');
 await typeText(st.t,'#9adfae');
 clickerOn(false);
}
async function wrongPresent(){
 S.lives--; updLives(); sfxBuzz();
 stage.classList.remove('shake'); void stage.offsetWidth; stage.classList.add('shake');

  ['kumai','「（おい灰崎、的を外すな。次はないと思って撃て）」']
 ]);
}
async function statementLoop(round){
 let i=0; const n=round.sts.length;
 while(true){
  await showStatement(round.sts[i],i,n);
  const act=await trialAction();
  const st=round.sts[i];
  if(act==='next'){ i=(i+1)%n; continue; }
  if(act==='prev'){ i=(i-1+n)%n; continue; }
  if(act==='press'){ await seq(st.press); continue; }
  // つきつける
  const ev=await openNotebook('select');
  if(ev==null) continue;
  if(ev===st.ok){
   await flash('そこだ！');
   await seq(st.okLines);
   return 'ok';
  }
  if(st.near && st.near[ev]){ await seq(st.near[ev]); continue; }
  await wrongPresent();
  if(S.lives<=0) return 'dead';
 }
}
async function runRound(round){
 while(true){
  await seq(round.intro);
  const res=await statementLoop(round);
  if(res==='ok') return;
  // ゲームオーバー → 同ラウンドやり直し
  setBGM(null); sfxBuzz();
  await seq([
   ['kumai','「待て待て、灰崎。今のは筋が通らん。……下手な追及は冤罪のもとだ」'],
   ['mizuhara','「……探偵さん、お疲れなんじゃないですか」'],
   ['n','――頭を冷やせ。証言と証拠、噛み合わない一点はどこだ。'],
   ['sys','◆ライフが回復した。もう一度、同じ証言に挑む。']
  ]);
  S.lives=5; updLives(); setBGM('tense');
 }
}
